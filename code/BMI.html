<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitQuest - BMI Calculator</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="BMI.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">FitQuest</div>

        <button class="hamburger">☰</button>

        <ul class="menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="BMI.html" class="active">BMI Calculator</a></li>
            <li><a href="workoutplan.html">Workout Plans</a></li>
            <li><a href="progress.html">Progress</a></li>
        </ul>
    </nav>

    <main class="bmi-page">
        <div class="bmi-bg-circle circle-1"></div>
        <div class="bmi-bg-circle circle-2"></div>

        <section class="bmi-card">
            <p class="bmi-tag">HEALTH TOOL</p>
            <h1>BMI Calculator</h1>
            <p class="bmi-subtitle">Check your body mass index and understand your body status</p>

            <div class="input-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" placeholder="Enter your height">
            </div>

            <div class="input-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" placeholder="Enter your weight">
            </div>

            <button class="bmi-btn" onclick="calculateBMI()">Calculate BMI</button>

            <div class="result-card" id="resultCard">
                <h2 id="bmiValue">BMI : -</h2>
                <p id="bmiStatus">Your result will appear here</p>
            </div>
        </section>
    </main>

    <script src="BMI.js"></script>
</body>
</html>
